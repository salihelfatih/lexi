services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: lexi
      POSTGRES_PASSWORD: lexi
      POSTGRES_DB: lexi
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lexi -d lexi"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: /bin/sh
    command: >
      -c "until mc alias set local http://minio:9000 minioadmin minioadmin;
      do sleep 2; done;
      mc mb --ignore-existing local/lexi-documents"

  qdrant:
    image: qdrant/qdrant:v1.13.2
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql://lexi:lexi@postgres:5432/lexi
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET_NAME: lexi-documents
      QDRANT_URL: http://qdrant:6333
      CORS_ORIGINS: '["http://localhost:3000"]'
      JWT_SECRET_KEY: change-this-secret-in-production
      UPLOAD_TEMP_DIR: /var/lib/lexi/uploads
    volumes:
      - upload_temp:/var/lib/lexi/uploads
    command: >
      bash -lc "alembic -c backend/alembic.ini upgrade head &&
      uvicorn backend.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      qdrant:
        condition: service_started

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql://lexi:lexi@postgres:5432/lexi
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET_NAME: lexi-documents
      QDRANT_URL: http://qdrant:6333
      JWT_SECRET_KEY: change-this-secret-in-production
      UPLOAD_TEMP_DIR: /var/lib/lexi/uploads
    volumes:
      - upload_temp:/var/lib/lexi/uploads
    command: celery -A backend.celery_app worker --loglevel=info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      qdrant:
        condition: service_started

volumes:
  postgres_data:
  minio_data:
  qdrant_data:
  upload_temp:
